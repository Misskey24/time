name: Build ipa for TrollStore

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build .app
        run: |
          xcodebuild \
            -project TimeFloatingStopwatch.xcodeproj \
            -scheme TimeFloatingStopwatch \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ENABLE_BITCODE=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Package as TrollStore .ipa
        run: |
          cd build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -R TimeFloatingStopwatch.app Payload/
          zip -r TimeFloatingStopwatch.ipa Payload
          mv TimeFloatingStopwatch.ipa "$GITHUB_WORKSPACE/"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v6
        with:
          name: TimeFloatingStopwatch-ipa
          path: TimeFloatingStopwatch.ipa
          if-no-files-found: error
