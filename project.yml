name: TimeFloatingStopwatch
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "14.0"
  developmentLanguage: zh-Hans
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  TimeFloatingStopwatch:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - TimeDynamicIslandExtension
      - path: Shared
    dependencies:
      - target: TimeDynamicIslandExtension
        embed: true
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: 时间悬浮秒表
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSSupportsLiveActivities: true
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - audio
        CADisableMinimumFrameDurationOnPhone: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: com.example.TimeFloatingStopwatch
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        ENABLE_BITCODE: NO
  TimeDynamicIslandExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - path: Sources/TimeDynamicIslandExtension
      - path: Shared
    info:
      path: Sources/TimeDynamicIslandExtension/Info.plist
      properties:
        CFBundleDisplayName: 灵动岛时间
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.TimeFloatingStopwatch.TimeDynamicIslandExtension
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        ENABLE_BITCODE: NO
